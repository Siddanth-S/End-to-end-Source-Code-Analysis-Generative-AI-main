name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t source-code-analyzer:latest .

      - name: Stop old container
        run: docker stop source-code-analyzer 2>/dev/null || true

      - name: Remove old container
        run: docker rm source-code-analyzer 2>/dev/null || true

      - name: Run new container
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          docker run -d \
            --name source-code-analyzer \
            --restart always \
            -p 5001:5001 \
            -e GOOGLE_API_KEY=$GOOGLE_API_KEY \
            source-code-analyzer:latest

      - name: Check container
        run: sleep 3 && docker ps | grep source-code-analyzer
