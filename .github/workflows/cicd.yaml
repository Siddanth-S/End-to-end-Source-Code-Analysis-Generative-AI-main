name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /home/ubuntu/source-code-analyzer || mkdir -p /home/ubuntu/source-code-analyzer
          cd /home/ubuntu/source-code-analyzer
          git init
          git remote remove origin 2>/dev/null || true
          git remote add origin https://github.com/Siddanth-S/End-to-end-Source-Code-Analysis-Generative-AI-main.git
          git fetch origin main
          git checkout -f origin/main

      - name: Build Docker image
        run: |
          cd /home/ubuntu/source-code-analyzer
          docker build -t source-code-analyzer:latest .

      - name: Push to ECR
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          ECR_REPO: ${{ secrets.ECR_REPO }}
        run: |
          aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
          docker tag source-code-analyzer:latest $(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO:latest
          docker push $(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO:latest

      - name: Deploy container
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          ECR_REPO: ${{ secrets.ECR_REPO }}
        run: |
          docker stop source-code-analyzer 2>/dev/null || true
          docker rm source-code-analyzer 2>/dev/null || true
          aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
          docker pull $(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO:latest
          docker run -d --name source-code-analyzer --restart always -p 5001:5001 -e GOOGLE_API_KEY=$GOOGLE_API_KEY $(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO:latest
          sleep 2
          docker ps | grep source-code-analyzer
