name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /home/ubuntu/source-code-analyzer || mkdir -p /home/ubuntu/source-code-analyzer
          cd /home/ubuntu/source-code-analyzer
          git init
          git remote remove origin 2>/dev/null || true
          git remote add origin https://github.com/Siddanth-S/End-to-end-Source-Code-Analysis-Generative-AI-main.git
          git fetch origin main
          git checkout -f origin/main

      - name: Install AWS CLI v2
        run: |
          set -ex
          cd /tmp
          echo "=== Downloading AWS CLI v2 ==="
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          unzip -o awscliv2.zip
          echo "=== Installing AWS CLI v2 ==="
          sudo /tmp/aws/install --update
          echo "=== Verifying AWS CLI installation ==="
          /usr/local/bin/aws --version
          echo "=== AWS CLI installed successfully ==="

      - name: Build Docker image
        run: |
          cd /home/ubuntu/source-code-analyzer
          docker build -t source-code-analyzer:latest .

      - name: Debug AWS credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          echo "Checking AWS CLI..."
          /usr/local/bin/aws --version
          echo "Checking AWS credentials..."
          /usr/local/bin/aws sts get-caller-identity

      - name: Push to ECR
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          ECR_REPO: ${{ secrets.ECR_REPO }}
        run: |
          set -e
          ACCOUNT_ID=$(/usr/local/bin/aws sts get-caller-identity --query Account --output text)
          ECR_URI="$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
          echo "ECR URI: $ECR_URI"
          /usr/local/bin/aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_URI
          docker tag source-code-analyzer:latest $ECR_URI/$ECR_REPO:latest
          docker push $ECR_URI/$ECR_REPO:latest

      - name: Deploy container
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          ECR_REPO: ${{ secrets.ECR_REPO }}
        run: |
          set -e
          cd /home/ubuntu/source-code-analyzer
          ACCOUNT_ID=$(/usr/local/bin/aws sts get-caller-identity --query Account --output text)
          ECR_URI="$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
          docker stop source-code-analyzer 2>/dev/null || true
          docker rm source-code-analyzer 2>/dev/null || true
          /usr/local/bin/aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_URI
          docker pull $ECR_URI/$ECR_REPO:latest
          docker run -d --name source-code-analyzer --restart always -p 5001:5001 -e GOOGLE_API_KEY=$GOOGLE_API_KEY $ECR_URI/$ECR_REPO:latest
          sleep 2
          docker ps | grep source-code-analyzer
